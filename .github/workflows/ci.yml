name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Protocol tests
        run: cargo test -p xconnect-protocol

      - name: Workspace check
        run: cargo check -p control-plane -p host-runtime -p viewer-runtime

  host-runtime-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check host-runtime (macOS)
        run: cargo check -p host-runtime

      - name: Test host-runtime (macOS)
        run: cargo test -p host-runtime
